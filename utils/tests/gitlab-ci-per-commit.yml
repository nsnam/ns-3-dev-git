# NS3 CI script for per-commit jobs

# Defines the per-commit jobs. They are executed for any branch
.base-per-commit-compile:
  extends: .base-build
  except:
    variables:
      - $CPPYY == "True"
      - $RELEASE == "weekly"
      - $RELEASE == "daily"
  image: archlinux
  before_script:
    - pacman-key --init
    - pacman -Sy archlinux-keyring --noconfirm
    - pacman -Syu --noconfirm
      base-devel gcc clang libc++ cmake ninja ccache
      python
      boost gsl gtk3 openmpi eigen
      openssh git

# Build stage
per-commit-clang-release-libc++:
  extends: .base-per-commit-compile
  stage: build
  variables:
    MODE: release
    COMPILER: clang++
    CXXFLAGS: -stdlib=libc++
    EXTRA_OPTIONS: --disable-gtk

per-commit-gcc-debug:
  extends: .base-per-commit-compile
  stage: build
  variables:
    MODE: debug
    COMPILER: g++

per-commit-gcc-default:
  extends: .base-per-commit-compile
  stage: build
  variables:
    MODE: default
    COMPILER: g++

per-commit-gcc-release:
  extends: .base-per-commit-compile
  stage: build
  variables:
    MODE: release
    COMPILER: g++

per-commit-disabled-precompiled-headers:
  extends: .base-per-commit-compile
  stage: build
  variables:
    MODE: debug
    COMPILER: g++
    EXTRA_OPTIONS: --disable-precompiled-headers

per-commit-clang-disabled-asserts-logs:
  extends: .base-per-commit-compile
  stage: build
  variables:
    MODE: debug
    COMPILER: clang++
    EXTRA_OPTIONS: --disable-asserts --disable-logs --disable-gtk

# Test stage
per-commit-gcc-default-test:
  extends: .base-per-commit-compile
  stage: test
  needs: ["per-commit-gcc-default"]
  dependencies:
    - per-commit-gcc-default
  variables:
    MODE: default
    COMPILER: g++

per-commit-gcc-release-test:
  extends: .base-per-commit-compile
  stage: test
  needs: ["per-commit-gcc-release"]
  dependencies:
    - per-commit-gcc-release
  variables:
    MODE: release
    COMPILER: g++

per-commit-clang-release-libc++-test:
  extends: .base-per-commit-compile
  stage: test
  needs: ["per-commit-clang-release-libc++"]
  dependencies:
    - per-commit-clang-release-libc++
  variables:
    MODE: release
    COMPILER: clang++
    CXXFLAGS: -stdlib=libc++
    EXTRA_OPTIONS: --disable-gtk
